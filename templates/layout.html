<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Outfit">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <title>Messages</title>
</head>

<body>
    <!-- shared navbar -->
    <nav class="navbar">
    <!-- Home -->
    <div class="left-navbar-group">
        <a href="/" class="top-button">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
                <path d="M9.464 1.286C10.294.803 11.092.5 12 .5c.908 0 1.707.303 2.537.786.795.462 1.7 1.142 2.815 1.977l2.232 1.675c1.391 1.042 2.359 1.766 2.888 2.826.53 1.059.53 2.268.528 4.006v4.3c0 1.355 0 2.471-.119 3.355-.124.928-.396 1.747-1.052 2.403-.657.657-1.476.928-2.404 1.053-.884.119-2 .119-3.354.119H7.93c-1.354 0-2.471 0-3.355-.119-.928-.125-1.747-.396-2.403-1.053-.656-.656-.928-1.475-1.053-2.403C1 18.541 1 17.425 1 16.07v-4.3c0-1.738-.002-2.947.528-4.006.53-1.06 1.497-1.784 2.888-2.826L6.65 3.263c1.114-.835 2.02-1.515 2.815-1.977zM10.5 13A1.5 1.5 0 0 0 9 14.5V21h6v-6.5a1.5 1.5 0 0 0-1.5-1.5h-3z" fill="currentColor"/>
            </svg>
            &nbsp;Home
        </a>

        <!-- mew post -->
        <a href="/newpost" class="top-button">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
                <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.8429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 C22.8132856,11.0605983 22.3423792,10.4322088 21.714504,10.118014 L4.13399899,1.16346272 C3.34915502,0.9 2.40734225,1.00636533 1.77946707,1.4776575 C0.994623095,2.10604706 0.8376543,3.0486314 1.15159189,3.99121575 L3.03521743,10.4322088 C3.03521743,10.5893061 3.34915502,10.7464035 3.50612381,10.7464035 L16.6915026,11.5318905 C16.6915026,11.5318905 17.1624089,11.5318905 17.1624089,12.0031827 C17.1624089,12.4744748 16.6915026,12.4744748 16.6915026,12.4744748 Z" fill="currentColor"/>
            </svg>
            &nbsp;New post
        </a>

        <!-- all posts -->
        <a href="/allposts" class="top-button">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
                <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            &nbsp;All posts
        </a>

        <!-- categories dropdown -->
        <div class="dropdown">
            <button class="cat-button">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M3 7v14h18V7H12l-2-3H3z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                &nbsp;Categories
            </button>
            <div class="dropdown-content">
                <a href="/category/0">Misc</a>
                <a href="/category/1">Science</a>
                <a href="/category/2">Math</a>
                <a href="/category/3">English</a>
                <a href="/category/4">History</a>
                <a href="/category/5">Digitech</a>
                <a href="/category/6">Politics</a>
                <a href="/category/7">Religion</a>
            </div>
        </div>
    </div>
    <div class="nav-right">
        <div class="dropdown-right">
            <button class="cat-button">
                
                &nbsp;Profile
            </button>
            <div class="dropdown-right-content">
                <a href="/admin" class="top-button">Admin panel</a>
                {% if session.username %}
                    <a href="{{ url_for('userposts', username=session['username']) }}" class="top-button">My Posts</a>
                    <a href="/logout" class="top-button">Logout</a>
                    {# if logged in, say so in navbar #}
                {% else %}
                    <a href="/login" class="top-button">Login</a>
                    <a href="/register" class="top-button">Register</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

    {% block body %}
    {% endblock %}
</body>

</html>
