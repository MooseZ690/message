{% extends "layout.html" %} <!-- borrows formatting, navbar etc from layout file -->

{% block body %}
<div class="centered-content">
    <div class="block"></div>
    <h1>Register</h1>
    <form method="post" class="login-container"> <!-- tells app.py the method="POST" -->
        <div class="top-box">
            <input type="text" id="username" name="username" class="login-box" placeholder="Username" required>

            <input type="text" id="password" name="password" class="login-box" placeholder="Password">

            <button type="submit" class="login-button">^</button>
            <!-- gets username and password from user -->
        </div>
    </form>
</div>
{% endblock %}
