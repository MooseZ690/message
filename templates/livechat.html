{% extends "layout.html" %}
{% block body %}

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<!-- imports socket.io so the page can send/receive live messages -->
<script>
window.addEventListener("load", function () {
    //when the page loads
    const chatBox = document.getElementById("chat-box");
    //find the chat box
    chatBox.scrollTop = chatBox.scrollHeight;
    //scroll to the bottom
});
</script>
<div class="chat-centered-content">
    <!-- box that holds all chat messages -->
    <div id="chat-box" class="chat-box">
        {% for message in messages %}
            <div class="chat-message">
                <div class="chat-meta">
                    <!-- information about the post - name, date -->
                    <strong>{{ message[2] }}</strong>
                    <span>{{ message[1] }}</span>
                </div>
                <div class="chat-text">{{ message[0] }}</div>   
            </div>
        {% endfor %}
        <!-- each old message loaded from the database -->
    </div>

    <!-- form to send a new message -->
    <form id="chat-form" class="chat-input-box">
        <input type="text" id="message-input" class="chat-input" placeholder="Type a message..." autocomplete="off"
            required>
        <button type="submit" class="chat-send-button">Send</button>
    </form>
</div>

<script>
    //connect to the flask socketio server
    const socket = io();

    //get important html elements from the page
    const form = document.getElementById("chat-form");
    const input = document.getElementById("message-input");
    const chatBox = document.getElementById("chat-box");
    

    form.addEventListener("submit", function (e) {
        //when the user submits the message
        e.preventDefault();
        //stop the page from refreshing
        const message = input.value.trim();
        //get the text the user typed and remove extra spaces
        if (message === "") return;
        //don't post if the message is empty
        socket.emit("send_message", { message: message });
        //send the message to flask through socketio
        input.value = "";
        //clear the input box after sending 
        chatBox.scrollTop = chatBox.scrollHeight;
        //scrolls to bottom
    });

    socket.on("receive_message", function (data) {
        const div = document.createElement("div");
        //make a new div for the incoming message from flask
        div.classList.add("chat-message");
        //makes the new div a chat-message
        div.innerHTML = `
            <div class="chat-meta">
                <strong class="chat-username">${data.username}</strong>
                <span class="chat-time">${data.time}</span>
            </div>
            <div class="chat-text">${data.message}</div>
        `;
        //add the message metadata
        chatBox.appendChild(div);
        //add the new message to the bottom of the chat box
        chatBox.scrollTop = chatBox.scrollHeight;
        //scrolls to bottom
    });
</script>

{% endblock %}
